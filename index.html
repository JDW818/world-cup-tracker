<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C0D10">
<title>World Cup 26 · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0C0D10; --panel:#16181E; --panel2:#1E2128; --line:#2C2F38;
    --text:#F4F2EC; --muted:#9A9CA6; --faint:#5E626E;
    --gold:#F1C44B; --gold-grad:linear-gradient(160deg,#F8E08E,#E7B23C 55%,#C98A1E);
    --green:#27C06B; --blue:#3B86F0; --red:#E4002B;
    --shadow:0 18px 50px rgba(0,0,0,.6);
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--ink); color:var(--text); font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45; padding-bottom:env(safe-area-inset-bottom); overscroll-behavior-y:none;}
  .app{max-width:520px; margin:0 auto; min-height:100vh; position:relative;
    background:radial-gradient(1100px 420px at 50% -12%, rgba(241,196,75,.07), transparent 60%), var(--ink);
    border-left:1px solid rgba(255,255,255,.03); border-right:1px solid rgba(255,255,255,.03);}

  /* ---------- Header ---------- */
  header{position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, rgba(12,13,16,.98), rgba(12,13,16,.9));
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:center; gap:11px; padding:13px 18px 11px;}
  .mark{font-family:'Oswald'; font-weight:700; font-size:25px; letter-spacing:1px; text-transform:uppercase;
    line-height:1; color:#fff; display:flex; align-items:center; gap:9px}
  .yr{background:var(--gold-grad); color:#1A1206; padding:3px 9px 2px; border-radius:7px; font-size:19px; line-height:1;
    box-shadow:0 2px 8px rgba(231,178,60,.25), inset 0 1px 0 rgba(255,255,255,.4);}
  .status{margin-left:auto; font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.8px;
    font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:7px}
  .status.live{color:var(--red)}
  .livedot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 0 0 rgba(228,0,43,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(228,0,43,.55)}70%{box-shadow:0 0 0 7px rgba(228,0,43,0)}100%{box-shadow:0 0 0 0 rgba(228,0,43,0)}}
  .tricolor{height:2px; background:linear-gradient(90deg, var(--red) 0 33.3%, var(--blue) 33.3% 66.6%, var(--green) 66.6% 100%); opacity:.85}

  /* chip rows */
  .chiprow{display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding:11px 18px}
  .chiprow::-webkit-scrollbar{display:none}
  .chiprow.days{padding-top:0}
  .chip{flex:0 0 auto; font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.6px;
    font-size:12.5px; color:var(--muted); background:var(--panel); border:1px solid var(--line);
    padding:8px 15px; border-radius:99px; cursor:pointer; transition:.16s; white-space:nowrap}
  .chip[aria-pressed="true"]{color:#1A1206; background:var(--gold); border-color:var(--gold)}
  .chip.day{font-size:12px; padding:6px 13px; letter-spacing:.4px}
  .chip.day[aria-pressed="true"]{background:var(--text); border-color:var(--text)}

  main{padding:14px 0 100px}
  .daygroup{padding:0 18px}
  .dayhdr{margin:20px 0 11px; font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:1px;
    font-size:12.5px; color:var(--muted); display:flex; align-items:center; gap:11px}
  .daygroup:first-child .dayhdr{margin-top:2px}
  .dayhdr::after{content:""; flex:1; height:1px; background:var(--line)}

  /* ---------- Match card (fixed layout: chevron is its own column) ---------- */
  .match{display:flex; align-items:center; gap:11px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:13px 13px 13px 15px; margin-bottom:10px; cursor:pointer; transition:transform .12s var(--ease), border-color .18s}
  .match:active{transform:scale(.985)}
  .match.islive{border-color:rgba(228,0,43,.5); box-shadow:inset 0 0 0 1px rgba(228,0,43,.16)}
  .m-body{flex:1; min-width:0}
  .m-chev{flex:0 0 auto; color:var(--faint); display:flex; align-items:center; justify-content:center; width:14px}
  .mtop{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px}
  .mmeta{font-family:'Oswald';font-weight:500;letter-spacing:.6px;text-transform:uppercase;font-size:11px;color:var(--muted)}
  .grouptag{font-family:'Oswald';font-weight:600;font-size:10.5px;letter-spacing:.5px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 7px}
  .livetag{color:var(--red);display:flex;align-items:center;gap:5px;font-weight:600}
  .row{display:grid; grid-template-columns:1fr auto; align-items:center; gap:10px; padding:3.5px 0}
  .tm{display:flex; align-items:center; gap:11px; min-width:0}
  .flag{font-size:21px; line-height:1; width:26px; text-align:center; flex:0 0 auto; filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}
  .abbr{font-family:'Oswald';font-weight:600;font-size:15.5px;letter-spacing:.5px; flex:0 0 auto; width:42px}
  .tname{font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .score{font-family:'Oswald'; font-weight:700; font-size:21px; line-height:1; min-width:20px; text-align:right; font-variant-numeric:tabular-nums}
  .winner{color:var(--text)} .loser{color:var(--muted)}

  /* ---------- knockout round panel ---------- */
  .roundwrap{padding:4px 18px}
  .rpanel{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:22px 20px; text-align:center; position:relative; overflow:hidden}
  .rpanel::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--gold-grad)}
  .rtrophy{font-size:34px; margin-bottom:6px}
  .rtitle{font-family:'Oswald';font-weight:700;font-size:24px;text-transform:uppercase;letter-spacing:.8px}
  .rcount{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:1px;font-size:11px;color:var(--gold);margin-top:4px}
  .rwhen{font-size:12.5px;color:var(--muted);margin-top:10px}
  .rrule{font-size:13px;color:var(--text);line-height:1.55;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .rlock{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.6px;font-size:10.5px;color:var(--faint);margin-top:14px;display:flex;align-items:center;justify-content:center;gap:6px}
  .qual{margin-top:14px}
  .qual h5{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.8px;font-size:10.5px;color:var(--muted);margin:0 0 10px}
  .qgrid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .qchip{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid rgba(39,192,107,.3);border-radius:99px;padding:5px 11px 5px 8px;font-family:'Oswald';font-weight:600;font-size:12.5px}
  .qchip .flag{font-size:16px;width:18px}
  .pathline{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 0 16px;flex-wrap:wrap}
  .pnode{font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px;color:var(--faint);padding:5px 9px;border:1px solid var(--line);border-radius:7px}
  .pnode.on{color:#1A1206;background:var(--gold);border-color:var(--gold)}
  .parrow{color:var(--faint);font-size:11px}

  /* ---------- Groups ---------- */
  .legend{display:flex; gap:7px 14px; padding:14px 18px 2px; font-size:11px; color:var(--muted); flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:3px}
  .d-through{background:var(--green)} .d-alive{background:var(--gold)} .d-third{background:var(--blue)} .d-out{background:var(--red)}
  .gcard{margin:12px 18px; background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden}
  .ghdr{display:flex; align-items:center; gap:10px; padding:14px 15px; cursor:pointer}
  .gname{font-family:'Oswald'; font-weight:700; font-size:17px; letter-spacing:.5px; text-transform:uppercase}
  .gname b{color:var(--gold)}
  .gsub{font-size:10.5px;color:var(--muted);margin-left:auto;font-family:'Oswald';letter-spacing:.6px;text-transform:uppercase}
  .gchev{transition:transform .25s var(--ease); color:var(--muted)}
  .gcard.open .gchev{transform:rotate(180deg)}
  table{width:100%; border-collapse:collapse; font-size:13px}
  thead th{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.6px;font-size:10px;color:var(--muted);padding:7px 4px;text-align:center;border-top:1px solid var(--line)}
  thead th.l{text-align:left; padding-left:15px}
  tbody td{padding:10px 4px; text-align:center; border-top:1px solid rgba(255,255,255,.045); font-variant-numeric:tabular-nums}
  .pos{width:30px; position:relative}
  .pos b{font-family:'Oswald';font-weight:600;font-size:13px}
  tbody tr.tappable{cursor:pointer}
  tbody tr.tappable:active{background:rgba(255,255,255,.03)}
  td.team{text-align:left; padding-left:11px}
  td.team .ti{display:flex; align-items:center; gap:8px}
  td.team .abbr{width:auto;font-size:14px}
  td.team .tn{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:78px}
  .pts{font-family:'Oswald';font-weight:700;font-size:15px}
  tr.qrow td:first-child::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:2px}
  tr.through td:first-child::before{background:var(--green)}
  tr.alive td:first-child::before{background:var(--gold)}
  tr.third td:first-child::before{background:var(--blue)}
  tr.out td:first-child::before{background:var(--red)}
  tr.out td.team .abbr,tr.out td.team .tn{opacity:.55}
  .gfix{padding:6px 15px 14px; display:none}
  .gcard.open .gfix{display:block}
  .gfix h4{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.8px;font-size:10.5px;color:var(--muted);margin:8px 0 7px}
  .mini{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;font-size:13px;cursor:pointer;background:var(--panel2)}
  .mini:active{transform:scale(.99)}
  .mini .mi-t{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .mini .mi-s{font-family:'Oswald';font-weight:600;font-variant-numeric:tabular-nums}
  .mini .vs{color:var(--muted);font-size:11px}

  /* ---------- Bottom nav ---------- */
  nav{position:fixed; bottom:0; left:0; right:0; z-index:40; display:flex; justify-content:center; pointer-events:none}
  .navbar{pointer-events:auto; display:flex; gap:4px; margin:0 auto 14px; padding:6px;
    background:rgba(22,24,30,.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border:1px solid var(--line); border-radius:99px; box-shadow:var(--shadow)}
  .navbtn{display:flex; align-items:center; gap:8px; padding:11px 22px; border-radius:99px; cursor:pointer;
    font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.7px; font-size:13px; color:var(--muted); transition:.2s; border:none; background:none}
  .navbtn[aria-current="true"]{color:#1A1206; background:var(--gold)}
  .navbtn svg{width:17px;height:17px}

  /* ---------- Sheet ---------- */
  .scrim{position:fixed; inset:0; z-index:50; background:rgba(4,5,8,.62); backdrop-filter:blur(3px); opacity:0; visibility:hidden; transition:.28s}
  .scrim.show{opacity:1; visibility:visible}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:51; max-width:520px; margin:0 auto; background:var(--panel);
    border-radius:22px 22px 0 0; border:1px solid var(--line); border-bottom:none; transform:translateY(102%);
    transition:transform .42s var(--ease); max-height:92vh; display:flex; flex-direction:column; box-shadow:var(--shadow)}
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:9px auto 2px;flex:0 0 auto}
  .sheet-scroll{overflow-y:auto; padding:4px 18px calc(26px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling:touch}
  .backlink{display:inline-flex; align-items:center; gap:5px; background:none; border:none; cursor:pointer; color:var(--muted);
    font-family:'Oswald'; font-weight:500; text-transform:uppercase; letter-spacing:.6px; font-size:11px; padding:9px 0 4px}

  .dt-head{text-align:center; padding:8px 0 14px}
  .dt-meta{font-family:'Oswald';text-transform:uppercase;letter-spacing:1px;font-size:11px;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;justify-content:center;gap:8px}
  .dt-teams{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:6px}
  .dt-side{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:6px 2px;border-radius:12px;transition:background .15s}
  .dt-side:active{background:rgba(255,255,255,.04)}
  .dt-flag{font-size:42px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  .dt-ab{font-family:'Oswald';font-weight:700;font-size:18px;letter-spacing:.5px}
  .dt-nm{font-size:11px;color:var(--muted);text-align:center;min-height:14px}
  .dt-mid{font-family:'Oswald';font-weight:700;text-align:center}
  .dt-mid .sc{font-size:38px;line-height:1;font-variant-numeric:tabular-nums}
  .dt-mid .ko{font-size:21px}
  .dt-mid .kos{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:.4px;text-transform:uppercase;margin-top:4px}
  .dt-mid .vs{font-size:13px;color:var(--muted);letter-spacing:1px}
  .tapnote{font-size:10px;color:var(--faint);text-align:center;margin-top:9px;font-family:'Oswald';letter-spacing:.5px;text-transform:uppercase}

  .sec-t{font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:1px;font-size:11.5px;color:var(--muted);margin:24px 0 12px;display:flex;align-items:center;gap:9px}
  .sec-t::after{content:"";flex:1;height:1px;background:var(--line)}

  .pbar{display:flex; height:13px; border-radius:7px; overflow:hidden; background:var(--panel2); border:1px solid var(--line)}
  .pseg{height:100%; width:0; transition:width .7s var(--ease)}
  .pseg.h{background:var(--blue)} .pseg.d{background:var(--faint)} .pseg.a{background:var(--red)}
  .plabels{display:flex; justify-content:space-between; margin-top:8px; font-size:11px; color:var(--muted)}
  .plabels b{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--text);display:block}
  .plabels .pl{text-align:center;flex:1}.plabels .pl:first-child{text-align:left}.plabels .pl:last-child{text-align:right}

  .seg{display:flex; gap:6px; margin:4px 0 14px; background:var(--panel2); padding:5px; border-radius:12px; border:1px solid var(--line)}
  .segb{flex:1; padding:10px 6px; border:none; background:none; border-radius:8px; cursor:pointer; color:var(--muted);
    font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.5px; font-size:12px; transition:.18s; display:flex; flex-direction:column; align-items:center; gap:2px}
  .segb .pc{font-size:10px;font-weight:400;opacity:.8}
  .segb[aria-pressed="true"]{background:var(--text); color:var(--ink)}
  .imp{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:15px}
  .imp-head{font-size:13px; margin-bottom:14px; line-height:1.55}
  .imp-head b{color:var(--gold)} .imp-head b.r{color:#ff5e74} .imp-head b.bl{color:var(--blue)}
  .iline{display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid rgba(255,255,255,.05)}
  .iline:first-of-type{border-top:none}
  .iline .il-t{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
  .iline .ipts{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .badge{font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:9.5px;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .b-through{background:rgba(39,192,107,.15);color:var(--green);border:1px solid rgba(39,192,107,.34)}
  .b-alive{background:rgba(241,196,75,.13);color:var(--gold);border:1px solid rgba(241,196,75,.32)}
  .b-third{background:rgba(59,134,240,.14);color:var(--blue);border:1px solid rgba(59,134,240,.34)}
  .b-out{background:rgba(228,0,43,.13);color:#ff5e74;border:1px solid rgba(228,0,43,.3)}
  .note{font-size:11.5px; color:var(--muted); margin-top:13px; line-height:1.55; display:flex; gap:7px}
  .note svg{flex:0 0 auto;margin-top:1px;opacity:.7}

  .qpanel{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:15px 15px 15px 18px; position:relative; overflow:hidden}
  .qpanel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .qpanel.through::before{background:var(--green)} .qpanel.alive::before{background:var(--gold)} .qpanel.third::before{background:var(--blue)} .qpanel.out::before{background:var(--red)}
  .qpanel .qh{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .qpanel .qhead{font-family:'Oswald';font-weight:700;font-size:18px;letter-spacing:.4px;line-height:1.1}
  .qpanel .qsub{font-size:13px;color:var(--muted);line-height:1.6}
  .record{display:flex;gap:8px;margin-top:14px}
  .rcell{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 0;text-align:center}
  .rcell .rv{font-family:'Oswald';font-weight:700;font-size:20px;line-height:1}
  .rcell .rl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:4px}
  .rcell.ptscell .rv{color:var(--gold)}
  .fxrow{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;background:var(--panel2)}
  .fxrow:active{transform:scale(.99)}
  .fxrow .fx-when{font-family:'Oswald';font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);width:52px;flex:0 0 auto}
  .fxrow .fx-opp{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
  .fxrow .fx-res{font-family:'Oswald';font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}
  .fxrow .res-w{color:var(--green)} .fxrow .res-l{color:#ff5e74} .fxrow .res-d{color:var(--muted)}
  .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:20px;border:1px dashed var(--line);border-radius:12px}

  @media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important}}
  :focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:6px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="mark">World Cup <span class="yr">26</span></div>
      <div class="status" id="hdrStatus"></div>
    </div>
    <div class="tricolor"></div>
    <div id="roundChips" class="chiprow"></div>
    <div id="dayChips" class="chiprow days"></div>
  </header>

  <div id="legendWrap" class="legend" style="display:none"></div>
  <main id="main"></main>

  <nav><div class="navbar">
    <button class="navbtn" data-view="matches" aria-current="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Matches</button>
    <button class="navbtn" data-view="groups">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Groups</button>
  </div></nav>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Details">
  <div class="grab"></div>
  <div class="sheet-scroll" id="sheetBody"></div>
</div>

<script>
/* ============================================================ DATA ============================================================ */

/* ============================================================ ENGINE ============================================================
   4-tier outlook per team:  through · alive (top-2 still possible) · third (best case 3rd → best-third race) · out
   ============================================================ */
function teamsOf(g){return STAND.filter(s=>s[2]===g).map(s=>s[0]);}
function remainingFixtures(g){return M.filter(m=>m.group===g&&(m.status==="sched"||m.status==="live"));}
function expectedRemaining(g){return teamsOf(g).reduce((n,ab)=>n+(3-TEAM[ab].gp),0)/2;}
function isFull(g){const r=remainingFixtures(g);return r.length>0&&r.length===expectedRemaining(g);}
function applyRes(pts,m,o){if(o==='H')pts[m.home]+=3;else if(o==='A')pts[m.away]+=3;else{pts[m.home]++;pts[m.away]++;}}

function aboveBounds(g,overrides){ // returns {ab:{min,max}} = teams strictly above (min=best, max=worst)
  overrides=overrides||{};
  const teams=teamsOf(g), base={}; teams.forEach(ab=>base[ab]=TEAM[ab].pts);
  const rem=remainingFixtures(g), out={}; teams.forEach(ab=>out[ab]={min:Infinity,max:-Infinity});
  if(isFull(g)){
    const free=rem.filter(m=>!(m.id in overrides)), fixed=rem.filter(m=>m.id in overrides), O=['H','D','A'];
    for(let c=0;c<Math.pow(3,free.length);c++){
      const pts={...base}; fixed.forEach(m=>applyRes(pts,m,overrides[m.id]));
      let cc=c; for(const m of free){applyRes(pts,m,O[cc%3]);cc=Math.floor(cc/3);}
      teams.forEach(ab=>{let gt=0;teams.forEach(o=>{if(o!==ab&&pts[o]>pts[ab])gt++;});
        if(gt<out[ab].min)out[ab].min=gt; if(gt>out[ab].max)out[ab].max=gt;});
    }
  } else {
    const pts={...base}, gp={}; teams.forEach(ab=>gp[ab]=TEAM[ab].gp);
    Object.keys(overrides).forEach(id=>{const m=MById[id]; if(m&&m.group===g){applyRes(pts,m,overrides[id]);gp[m.home]++;gp[m.away]++;}});
    const maxp={}; teams.forEach(ab=>maxp[ab]=pts[ab]+3*(3-gp[ab]));
    teams.forEach(ab=>{let must=0,can=0;teams.forEach(o=>{if(o!==ab){if(pts[o]>maxp[ab])must++;if(maxp[o]>pts[ab])can++;}});out[ab]={min:must,max:can};});
  }
  return out;
}
function classifyGroup(g,overrides){
  const ab=aboveBounds(g,overrides), res={};
  Object.keys(ab).forEach(t=>{const best=ab[t].min+1,worst=ab[t].max+1;
    res[t]=worst<=2?'through':best<=2?'alive':best===3?'third':'out';});
  return res;
}
function projPoints(g,m,o){const pts={};teamsOf(g).forEach(ab=>pts[ab]=TEAM[ab].pts);if(o)applyRes(pts,m,o);return pts;}

/* ============================================================ MATCHES VIEW ============================================================ */
let selectedRound='groups', selectedDay='all';
const allDays=[...new Set(M.map(m=>ymd(m.ko)))].sort();

function matchCard(m){
  const t=TEAM, live=m.status==="live", fin=m.status==="final";
  let meta = fin?`<span>Full time</span>`:live?`<span class="livetag"><span class="livedot"></span>Live</span>`:`<span>${fmtTime(m.ko)}</span>`;
  const sc=(a,b)=>`<div class="score ${a>b?'winner':a<b?'loser':''}">${a}</div>`;
  const teamRow=(ab,right)=>`<div class="row"><div class="tm"><span class="flag">${t[ab].flag}</span><span class="abbr">${ab}</span><span class="tname">${t[ab].name}</span></div>${right||''}</div>`;
  let rows = fin?teamRow(m.home,sc(m.hs,m.as))+teamRow(m.away,sc(m.as,m.hs))
    :live?teamRow(m.home,`<div class="score">${m.hs}</div>`)+teamRow(m.away,`<div class="score">${m.as}</div>`)
    :teamRow(m.home)+teamRow(m.away);
  return `<div class="match ${live?'islive':''}" data-m="${m.id}" tabindex="0" role="button" aria-label="View implications">
    <div class="m-body"><div class="mtop"><div class="mmeta">${meta}</div><span class="grouptag">Group ${m.group}</span></div>${rows}</div>
    <div class="m-chev"><svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 1.5l6 6-6 6"/></svg></div></div>`;
}
function renderMatches(){
  const main=document.getElementById('main');
  document.getElementById('legendWrap').style.display='none';
  document.getElementById('roundChips').style.display='flex';
  document.getElementById('roundChips').innerHTML=ROUNDS.map(([k,l])=>`<button class="chip" data-round="${k}" aria-pressed="${selectedRound===k}">${l}</button>`).join('');
  const dayChips=document.getElementById('dayChips');
  if(selectedRound==='groups'){
    dayChips.style.display='flex';
    dayChips.innerHTML=`<button class="chip day" data-day="all" aria-pressed="${selectedDay==='all'}">All days</button>`+
      allDays.map(d=>{const dt=new Date(d+'T12:00:00');return `<button class="chip day" data-day="${d}" aria-pressed="${selectedDay===d}">${dayShort(dt)}</button>`;}).join('');
  } else dayChips.style.display='none';

  if(selectedRound!=='groups'){ main.innerHTML=`<div class="roundwrap">${roundView(selectedRound)}</div>`; wireRound(); return; }

  let list=[...M].sort((a,b)=>a.ko-b.ko);
  if(selectedDay!=='all') list=list.filter(m=>ymd(m.ko)===selectedDay);
  if(!list.length){main.innerHTML=`<div class="empty" style="margin:24px 18px">No matches on this day.</div>`;return;}
  if(selectedDay!=='all'){
    main.innerHTML=`<div class="daygroup">${list.map(matchCard).join('')}</div>`;
  } else {
    const days={}; list.forEach(m=>{const k=dayKey(m.ko);(days[k]=days[k]||[]).push(m);});
    main.innerHTML=Object.keys(days).map(k=>{
      const isToday=days[k][0].ko.toLocaleDateString()===todayKey;
      return `<div class="daygroup"><div class="dayhdr">${isToday?'Today · ':''}${k}</div>${days[k].map(matchCard).join('')}</div>`;
    }).join('');
  }
  bindMatches();
}
function roundView(rk){
  const r=ROUND_META[rk];
  const path=ROUNDS.filter(x=>x[0]!=='groups').map(([k,l])=>`<span class="pnode ${k===rk?'on':''}">${k.toUpperCase()}</span>`).join('<span class="parrow">›</span>');
  let qual='';
  if(rk==='r32'){
    const through=STAND.map(s=>s[0]).filter(ab=>classifyGroup(TEAM[ab].group,{})[ab]==='through').sort((a,b)=>TEAM[a].group.localeCompare(TEAM[b].group));
    qual=`<div class="qual"><h5>Already qualified · ${through.length} of 32</h5><div class="qgrid">${
      through.map(ab=>`<span class="qchip"><span class="flag">${TEAM[ab].flag}</span>${ab}</span>`).join('')}</div></div>`;
  }
  return `<div class="rpanel">
    <div class="pathline">${path}</div>
    <div class="rtrophy">${r.icon}</div>
    <div class="rtitle">${r.title}</div>
    <div class="rcount">${r.count}</div>
    <div class="rwhen">${r.when}</div>
    <div class="rrule">${r.rule}</div>
    ${qual}
    <div class="rlock"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>Bracket locks once the group stage finishes</div>
  </div>`;
}
function wireRound(){document.querySelectorAll('[data-round]').forEach(c=>c.addEventListener('click',()=>{selectedRound=c.dataset.round;renderMatches();}));}
function bindMatches(){
  document.querySelectorAll('.m-body').forEach(()=>{});
  document.querySelectorAll('[data-m]').forEach(el=>{
    el.addEventListener('click',()=>openMatch(el.dataset.m));
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openMatch(el.dataset.m);}});
  });
  document.querySelectorAll('[data-round]').forEach(c=>c.addEventListener('click',()=>{selectedRound=c.dataset.round;renderMatches();}));
  document.querySelectorAll('[data-day]').forEach(c=>c.addEventListener('click',()=>{selectedDay=c.dataset.day;renderMatches();}));
}

  }).join('');
  document.querySelectorAll('[data-gh]').forEach(h=>h.addEventListener('click',()=>h.parentElement.classList.toggle('open')));
  document.querySelectorAll('tr[data-team]').forEach(r=>r.addEventListener('click',()=>openTeam(r.dataset.team)));
  document.querySelectorAll('.gfix [data-m]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();openMatch(el.dataset.m);}));
}

/* ============================================================ SHEET ============================================================ */
let stack=[];
function pushSheet(s){stack.push(s);renderSheet();showSheet();}
function backSheet(){stack.pop();stack.length?renderSheet():closeSheet();}
function openMatch(id){stack=[{type:'match',key:id}];renderSheet();showSheet();}
function openTeam(ab){stack=[{type:'team',key:ab}];renderSheet();showSheet();}
function showSheet(){document.getElementById('sheet').classList.add('show');document.getElementById('scrim').classList.add('show');document.body.style.overflow='hidden';}
function closeSheet(){document.getElementById('sheet').classList.remove('show');document.getElementById('scrim').classList.remove('show');document.body.style.overflow='';stack=[];}
function renderSheet(){
  const top=stack[stack.length-1];
  document.getElementById('sheetBody').innerHTML=top.type==='match'?matchSheet(top.key):teamSheet(top.key);
  wireSheet();
  requestAnimationFrame(()=>setTimeout(()=>document.querySelectorAll('.pseg').forEach(s=>s.style.width=s.dataset.w+'%'),60));
}

const verbFor=s=>s==='through'?'<b>qualify</b>':s==='out'?'are <b class="r">eliminated</b>':s==='third'?'drop into the <b class="bl">3rd-place race</b>':'keep the <b>top-two fight</b> alive';
function implicationsBlock(m,out){
  const g=m.group, cls=classifyGroup(g,{[m.id]:out}), pts=projPoints(g,m,out);
  const hN=TEAM[m.home].name,aN=TEAM[m.away].name;
  let head=out==='H'?`${hN} win — ${hN} ${verbFor(cls[m.home])}; ${aN} ${verbFor(cls[m.away])}.`
    :out==='A'?`${aN} win — ${aN} ${verbFor(cls[m.away])}; ${hN} ${verbFor(cls[m.home])}.`
    :`Draw — ${hN} ${verbFor(cls[m.home])}; ${aN} ${verbFor(cls[m.away])}.`;
  const lines=teamsOf(g).map(ab=>({ab,...TEAM[ab],s:cls[ab],pp:pts[ab]})).sort((a,b)=>b.pp-a.pp||a.rank-b.rank).map(t=>{
    const playing=t.ab===m.home||t.ab===m.away;
    return `<div class="iline"><div class="il-t"><span class="flag" style="font-size:18px;width:22px">${t.flag}</span><span class="abbr" style="width:auto">${t.ab}</span>${playing?'':`<span class="tname" style="font-size:11px">${t.name}</span>`}</div><span class="ipts">${t.pp} pts</span>${badge(t.s)}</div>`;
  }).join('');
  const note=isFull(g)?`Top two of Group ${g} go straight through; a 3rd-place finish keeps a team in the best-third-placed race for the last 8 of those spots. Shown on points — goal difference can still split ties.`
    :`Projection from points reach — exact pairings for the remaining matchday aren't in the feed yet.`;
  return `<div class="imp"><div class="imp-head">${head}</div>${lines}
    <div class="note"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg><span>${note}</span></div></div>`;
}
function currentGroupBlock(g){
  const cls=classifyGroup(g,{});
  const rows=teamsOf(g).map(ab=>TEAM[ab]).sort((a,b)=>a.rank-b.rank).map(t=>
    `<div class="iline"><div class="il-t"><span class="flag" style="font-size:18px;width:22px">${t.flag}</span><span class="abbr" style="width:auto">${t.ab}</span><span class="tname" style="font-size:11px">${t.name}</span></div><span class="ipts">${t.pts} pts</span>${badge(cls[t.ab])}</div>`).join('');
  return `<div class="imp">${rows}<div class="note"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg><span>Where Group ${g} stands now. Top two advance; third place chases a best-third-placed spot.</span></div></div>`;
}
function matchSheet(id){
  const m=MById[id],t=TEAM,live=m.status==='live',fin=m.status==='final';
  let mid = fin?`<div class="sc">${m.hs}–${m.as}</div><div class="kos">Full time</div>`
    :live?`<div class="sc" style="color:var(--red)">${m.hs}–${m.as}</div><div class="kos"><span class="livedot" style="display:inline-block;margin-right:5px"></span>Live now</div>`
    :`<div class="vs">VS</div><div class="ko">${fmtTime(m.ko)}</div><div class="kos">${fmtDayFull(m.ko)}</div>`;
  const back=stack.length>1?`<button class="backlink" data-back>‹ Back</button>`:'';
  let body=`${back}<div class="dt-head">
    <div class="dt-meta"><span class="grouptag">Group ${m.group}</span>${fin?'Full time':live?'In progress':fmtDayFull(m.ko)}</div>
    <div class="dt-teams">
      <div class="dt-side" data-team="${m.home}"><div class="dt-flag">${t[m.home].flag}</div><div class="dt-ab">${m.home}</div><div class="dt-nm">${t[m.home].name}</div></div>
      <div class="dt-mid">${mid}</div>
      <div class="dt-side" data-team="${m.away}"><div class="dt-flag">${t[m.away].flag}</div><div class="dt-ab">${m.away}</div><div class="dt-nm">${t[m.away].name}</div></div>
    </div><div class="tapnote">Tap a team for their full outlook</div></div>`;
  if(m.wp) body+=`<div class="sec-t">Win probability</div>
    <div class="pbar"><div class="pseg h" data-w="${m.wp.h}"></div><div class="pseg d" data-w="${m.wp.d}"></div><div class="pseg a" data-w="${m.wp.a}"></div></div>
    <div class="plabels"><div class="pl"><b>${m.wp.h}%</b>${m.home}</div><div class="pl"><b>${m.wp.d}%</b>Draw</div><div class="pl"><b>${m.wp.a}%</b>${m.away}</div></div>`;
  if(fin){body+=`<div class="sec-t">What this result means</div>${currentGroupBlock(m.group)}`;}
  else{
    let def='H';
    if(live)def=m.hs>m.as?'H':m.as>m.hs?'A':'D';
    else if(m.wp){const mx=Math.max(m.wp.h,m.wp.d,m.wp.a);def=mx===m.wp.h?'H':mx===m.wp.a?'A':'D';}
    const segb=(k,lab,pc)=>`<button class="segb" data-out="${k}" aria-pressed="${k===def}">${lab}${pc!=null?`<span class="pc">${pc}%</span>`:''}</button>`;
    body+=`<div class="sec-t">If the match ends…</div><div class="seg" id="segbar">
      ${segb('H',m.home+' win',m.wp?m.wp.h:null)}${segb('D','Draw',m.wp?m.wp.d:null)}${segb('A',m.away+' win',m.wp?m.wp.a:null)}</div>
      <div id="impWrap">${implicationsBlock(m,def)}</div>`;
  }
  return body;
}

/* ----- richer team scenario ----- */
function teamScenario(ab){
  const t=TEAM[ab],g=t.group,now=classifyGroup(g,{})[ab];
  const bd=aboveBounds(g,{})[ab], worstPos=bd.max+1;
  const next=M.filter(m=>m.group===g&&(m.status==='sched'||m.status==='live')&&(m.home===ab||m.away===ab)).sort((a,b)=>a.ko-b.ko)[0];
  if(now==='through'){
    return{tone:'through',head: worstPos===1?'Top spot secured':'Through to the last 32',
      sub: worstPos===1?'Guaranteed to win the group and seal a top seeding for the knockouts.':'A top-two finish is locked in — already into the Round of 32.'};
  }
  if(now==='out') return{tone:'out',head:'Eliminated',sub:'Out of reach for both a top-two place and a best-third spot. Their tournament ends in the group stage.'};
  if(now==='third'){
    let sub='Can no longer catch the top two, but a third-place finish would keep them in the race for the eight best-third-placed berths.';
    if(next){const opp=TEAM[next.home===ab?next.away:next.home].name, win=next.home===ab?'H':'A';
      const sW=classifyGroup(g,{[next.id]:win})[ab];
      sub+= sW==='third'?` A win over ${opp} strengthens that third-place push.`:` They likely need a result against ${opp} to stay in it.`;}
    return{tone:'third',head:'In the third-place race',sub};
  }
  // alive — give the concrete path
  if(!next) return{tone:'alive',head:'Still alive',sub:'A top-two place is still mathematically possible, but it now hinges on other results in the group.'};
  const opp=TEAM[next.home===ab?next.away:next.home].name, win=next.home===ab?'H':'A', loss=next.home===ab?'A':'H';
  const sW=classifyGroup(g,{[next.id]:win})[ab], sD=classifyGroup(g,{[next.id]:'D'})[ab], sL=classifyGroup(g,{[next.id]:loss})[ab];
  let head,sub;
  if(sD==='through'&&sW==='through'){head='Draw or better to qualify';sub=`Avoid defeat against ${opp} and a top-two place is guaranteed.`;}
  else if(sW==='through'){head='Win to qualify';sub=`Beat ${opp} and they're through. A draw (→ ${STLABEL[sD][0].toLowerCase()}) leaves it to other results.`;}
  else if(sW==='alive'){head='Win and hope';sub=`A win over ${opp} keeps them in control of a top-two place, but they may still need a favour elsewhere.`;}
  else {head='Outside chance';sub=`Realistically need to beat ${opp} and lean on other results to climb into the top two.`;}
  if(sL==='out') sub+=` Defeat ends their run entirely.`;
  else if(sL==='third') sub+=` Defeat would drop them into the third-place race.`;
  return{tone:'alive',head,sub};
}
function teamSheet(ab){
  const t=TEAM[ab],g=t.group,sc=teamScenario(ab);
  const back=stack.length>1?`<button class="backlink" data-back>‹ Back</button>`:'';
  const fixtures=M.filter(m=>m.group===g&&(m.home===ab||m.away===ab)).sort((a,b)=>a.ko-b.ko);
  const fxHtml=fixtures.length?fixtures.map(m=>{
    const opp=m.home===ab?m.away:m.home, oppT=TEAM[opp]; let when,res='';
    if(m.status==='final'){const gf=m.home===ab?m.hs:m.as,ga=m.home===ab?m.as:m.hs;const r=gf>ga?'W':gf<ga?'L':'D';when='Final';res=`<span class="fx-res res-${r.toLowerCase()}">${r} ${gf}–${ga}</span>`;}
    else if(m.status==='live'){const gf=m.home===ab?m.hs:m.as,ga=m.home===ab?m.as:m.hs;when='<span style="color:var(--red)">Live</span>';res=`<span class="fx-res" style="color:var(--red)">${gf}–${ga}</span>`;}
    else {when=dayKey(m.ko);res=`<span class="fx-res" style="color:var(--muted);font-weight:600">${fmtTime(m.ko)}</span>`;}
    return `<div class="fxrow" data-m="${m.id}"><div class="fx-when">${when}</div>
      <div class="fx-opp"><span style="color:var(--muted);font-size:11px">v</span> <span class="flag" style="font-size:18px;width:22px">${oppT.flag}</span><span class="abbr" style="width:auto;font-size:14px">${opp}</span><span class="tname">${oppT.name}</span></div>${res}</div>`;
  }).join(''):`<div class="empty">Fixtures will appear here as the remaining matchday is scheduled.</div>`;
  return `${back}<div class="dt-head" style="padding-bottom:10px">
      <div class="dt-flag" style="font-size:54px">${t.flag}</div>
      <div class="dt-ab" style="font-size:22px;margin-top:8px">${t.name}</div>
      <div class="dt-meta" style="margin:8px 0 0"><span class="grouptag">Group ${g}</span>${ORD(t.rank)} · ${t.pts} pts</div></div>
    <div class="sec-t">Road to the last 32</div>
    <div class="qpanel ${sc.tone}"><div class="qh"><div class="qhead">${sc.head}</div>${badge(sc.tone)}</div><div class="qsub">${sc.sub}</div></div>
    <div class="record">
      <div class="rcell"><div class="rv">${t.gp}</div><div class="rl">Played</div></div>
      <div class="rcell"><div class="rv">${t.w}</div><div class="rl">Won</div></div>
      <div class="rcell"><div class="rv">${t.d}</div><div class="rl">Drawn</div></div>
      <div class="rcell"><div class="rv">${t.l}</div><div class="rl">Lost</div></div>
      <div class="rcell ptscell"><div class="rv">${t.pts}</div><div class="rl">Points</div></div></div>
    <div class="sec-t">Fixtures</div>${fxHtml}`;
}
function wireSheet(){
  const b=document.querySelector('[data-back]'); if(b)b.addEventListener('click',backSheet);
  document.querySelectorAll('.dt-side[data-team]').forEach(el=>el.addEventListener('click',()=>pushSheet({type:'team',key:el.dataset.team})));
  document.querySelectorAll('.fxrow[data-m]').forEach(el=>el.addEventListener('click',()=>pushSheet({type:'match',key:el.dataset.m})));
  const seg=document.getElementById('segbar');
  if(seg)seg.querySelectorAll('.segb').forEach(btn=>btn.addEventListener('click',()=>{
    seg.querySelectorAll('.segb').forEach(x=>x.setAttribute('aria-pressed','false'));
    btn.setAttribute('aria-pressed','true');
    document.getElementById('impWrap').innerHTML=implicationsBlock(MById[stack[stack.length-1].key],btn.dataset.out);
  }));
}
document.getElementById('scrim').addEventListener('click',closeSheet);
document.addEventListener('keydown',e=>{if(e.key==='Escape')stack.length>1?backSheet():closeSheet();});
(function(){const sh=document.getElementById('sheet');let y0=null;
  sh.addEventListener('touchstart',e=>{if(sh.scrollTop<=0)y0=e.touches[0].clientY;},{passive:true});
  sh.addEventListener('touchmove',e=>{if(y0===null)return;const dy=e.touches[0].clientY-y0;if(dy>0)sh.style.transform=`translateY(${dy}px)`;},{passive:true});
  sh.addEventListener('touchend',e=>{if(y0===null)return;const dy=e.changedTouches[0].clientY-y0;sh.style.transform='';if(dy>110)closeSheet();y0=null;});
})();

/* ============================================================ NAV + INIT ============================================================ */
function setView(v){
  document.querySelectorAll('.navbtn').forEach(b=>b.setAttribute('aria-current',b.dataset.view===v));
  window.scrollTo(0,0);
  v==='matches'?renderMatches():renderGroups();
}
document.querySelectorAll('.navbtn').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));
function initHeader(){
  const liveN=M.filter(m=>m.status==='live').length;
  const st=document.getElementById('hdrStatus');
  if(liveN){st.className='status live';st.innerHTML=`<span class="livedot"></span>${liveN} Live`;}
  else{const next=M.filter(m=>m.status==='sched').sort((a,b)=>a.ko-b.ko)[0];if(next){st.className='status';st.textContent='Next '+fmtTime(next.ko);}}
}
initHeader(); setView('matches');
</script>
