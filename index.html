<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C0D10">
<title>World Cup 26 · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0C0D10; --panel:#15171D; --panel2:#1D2027; --line:#2B2E37;
    --text:#F4F2EC; --muted:#9498A4; --faint:#5E626E;
    --gold:#F1C44B; --gold-grad:linear-gradient(150deg,#FBE9A8,#E9B43C 52%,#C68A22);
    --green:#27C06B; --blue:#3B86F0; --red:#E4002B;
    --shadow:0 18px 50px rgba(0,0,0,.6); --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--ink); color:var(--text); font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45; padding-bottom:env(safe-area-inset-bottom); overscroll-behavior-y:none;}
  .app{max-width:520px; margin:0 auto; min-height:100vh; position:relative;
    background:radial-gradient(1100px 440px at 50% -14%, rgba(241,196,75,.06), transparent 60%), var(--ink);
    border-left:1px solid rgba(255,255,255,.03); border-right:1px solid rgba(255,255,255,.03);}

  header{position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, rgba(12,13,16,.99), rgba(12,13,16,.94));
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:center; gap:10px; padding:14px 18px 12px;}
  .trophy{width:19px;height:19px;color:var(--gold);flex:0 0 auto;filter:drop-shadow(0 1px 2px rgba(231,178,60,.4))}
  .mark{font-family:'Oswald'; font-weight:700; font-size:24px; letter-spacing:.6px; text-transform:uppercase; line-height:1; color:#fff;}
  .mark .yr{font-size:26px; background:var(--gold-grad); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; margin-left:5px; letter-spacing:0;}
  .status{margin-left:auto; font-family:'Oswald'; font-weight:500; text-transform:uppercase; letter-spacing:.7px;
    font-size:10px; color:var(--muted); text-align:right; line-height:1.35}
  .status b{color:var(--text);font-weight:600;font-size:12px;letter-spacing:.5px}
  .tricolor{height:2px; background:linear-gradient(90deg, var(--red) 0 33.3%, var(--blue) 33.3% 66.6%, var(--green) 66.6% 100%); opacity:.9}

  .phases{display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; padding:12px 18px 0}
  .phases::-webkit-scrollbar{display:none}
  .pchip{flex:0 0 auto; font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.6px;
    font-size:12.5px; color:var(--muted); background:var(--panel); border:1px solid var(--line);
    padding:8px 15px; border-radius:99px; cursor:pointer; transition:.16s; white-space:nowrap}
  .pchip[aria-pressed="true"]{color:#1A1206; background:var(--gold); border-color:var(--gold)}

  .railwrap{position:relative; margin-top:11px}
  .railwrap::before,.railwrap::after{content:""; position:absolute; top:0; bottom:0; width:24px; z-index:2; pointer-events:none}
  .railwrap::before{left:0; background:linear-gradient(90deg, var(--ink), transparent)}
  .railwrap::after{right:0; background:linear-gradient(270deg, var(--ink), transparent)}
  .rail{display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding:0 18px 13px; scroll-behavior:smooth}
  .rail::-webkit-scrollbar{display:none}
  .dpill{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:3px; min-width:50px;
    padding:8px 10px 7px; border:1px solid var(--line); border-radius:14px; background:var(--panel); cursor:pointer; transition:.16s; position:relative}
  .dpill .dw{font-family:'Oswald'; font-weight:500; text-transform:uppercase; letter-spacing:.6px; font-size:10px; color:var(--muted)}
  .dpill .dd{font-family:'Oswald'; font-weight:700; font-size:18px; line-height:1; color:var(--text)}
  .dpill .dind{width:5px;height:5px;border-radius:50%;margin-top:1px;background:transparent}
  .dpill.done .dind{background:var(--faint)}
  .dpill.up .dind{background:var(--gold)}
  .dpill.past{opacity:.6}
  .dpill.today{border-color:rgba(241,196,75,.5)}
  .dpill.today .dw{color:var(--gold)}
  .dpill.sel{background:var(--gold); border-color:var(--gold)}
  .dpill.sel .dw,.dpill.sel .dd{color:#1A1206}
  .dpill.sel .dind{background:rgba(26,18,6,.55)}

  main{padding:6px 0 100px}
  .daygroup{padding:0 18px}
  .dayhdr{margin:16px 0 12px; display:flex; align-items:baseline; gap:10px}
  .dayhdr .dt{font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.8px; font-size:14px}
  .dayhdr .md{font-family:'Oswald'; font-weight:500; text-transform:uppercase; letter-spacing:.6px; font-size:10.5px; color:var(--gold); border:1px solid rgba(241,196,75,.3); border-radius:6px; padding:1px 7px}
  .dayhdr .ct{font-size:11px;color:var(--muted);margin-left:auto}

  .match{display:flex; align-items:center; gap:11px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:13px 13px 13px 15px; margin-bottom:10px; cursor:pointer; transition:transform .12s var(--ease), border-color .18s}
  .match:active{transform:scale(.985)}
  .m-body{flex:1; min-width:0}
  .m-chev{flex:0 0 auto; color:var(--faint); display:flex; align-items:center; width:13px}
  .mtop{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px}
  .mmeta{font-family:'Oswald';font-weight:500;letter-spacing:.6px;text-transform:uppercase;font-size:11px;color:var(--muted)}
  .grouptag{font-family:'Oswald';font-weight:600;font-size:10.5px;letter-spacing:.5px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 7px}
  .row{display:grid; grid-template-columns:1fr auto; align-items:center; gap:10px; padding:3.5px 0}
  .tm{display:flex; align-items:center; gap:11px; min-width:0}
  .flag{font-size:21px; line-height:1; width:26px; text-align:center; flex:0 0 auto; filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}
  .abbr{font-family:'Oswald';font-weight:600;font-size:15.5px;letter-spacing:.5px; flex:0 0 auto; width:42px}
  .tname{font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .score{font-family:'Oswald'; font-weight:700; font-size:21px; line-height:1; min-width:20px; text-align:right; font-variant-numeric:tabular-nums}
  .winner{color:var(--text)} .loser{color:var(--muted)}

  .roundwrap{padding:10px 18px}
  .rpanel{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:24px 20px; text-align:center; position:relative; overflow:hidden}
  .rpanel::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--gold-grad)}
  .pathline{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
  .pnode{font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px;color:var(--faint);padding:5px 9px;border:1px solid var(--line);border-radius:7px}
  .pnode.on{color:#1A1206;background:var(--gold);border-color:var(--gold)}
  .parrow{color:var(--faint);font-size:11px}
  .rtrophy{color:var(--gold);margin-bottom:8px}
  .rtitle{font-family:'Oswald';font-weight:700;font-size:25px;text-transform:uppercase;letter-spacing:.8px}
  .rcount{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:1px;font-size:11px;color:var(--gold);margin-top:5px}
  .rwhen{font-size:12.5px;color:var(--muted);margin-top:11px}
  .rrule{font-size:13px;line-height:1.6;margin-top:15px;padding-top:15px;border-top:1px solid var(--line);color:var(--text)}
  .rlock{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.6px;font-size:10.5px;color:var(--faint);margin-top:16px;display:flex;align-items:center;justify-content:center;gap:6px}
  .qual{margin-top:18px;text-align:left}
  .qual h5{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.8px;font-size:10.5px;color:var(--muted);margin:0 0 11px;text-align:center}
  .qgrid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .qchip{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid rgba(39,192,107,.32);border-radius:99px;padding:5px 11px 5px 8px;font-family:'Oswald';font-weight:600;font-size:12.5px}
  .qchip .flag{font-size:15px;width:17px}

  .legend{display:flex; gap:7px 14px; padding:14px 18px 2px; font-size:11px; color:var(--muted); flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:6px}
  .ldot{width:9px;height:9px;border-radius:3px}
  .l-through{background:var(--green)} .l-alive{background:var(--gold)} .l-third{background:var(--blue)} .l-out{background:var(--red)}
  .gcard{margin:12px 18px; background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden}
  .ghdr{display:flex; align-items:center; gap:10px; padding:14px 15px; cursor:pointer}
  .gname{font-family:'Oswald'; font-weight:700; font-size:17px; letter-spacing:.5px; text-transform:uppercase}
  .gname b{color:var(--gold)}
  .gsub{font-size:10.5px;color:var(--muted);margin-left:auto;font-family:'Oswald';letter-spacing:.6px;text-transform:uppercase}
  .gchev{transition:transform .25s var(--ease); color:var(--muted); flex:0 0 auto}
  .gcard.open .gchev{transform:rotate(180deg)}
  table{width:100%; border-collapse:collapse; font-size:13px}
  thead th{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.6px;font-size:10px;color:var(--muted);padding:7px 3px;text-align:center;border-top:1px solid var(--line)}
  thead th.l{text-align:left; padding-left:15px}
  tbody td{padding:10px 3px; text-align:center; border-top:1px solid rgba(255,255,255,.045); font-variant-numeric:tabular-nums}
  .pos{width:28px; position:relative}
  .pos b{font-family:'Oswald';font-weight:600;font-size:13px}
  tbody tr.tappable{cursor:pointer}
  tbody tr.tappable:active{background:rgba(255,255,255,.03)}
  td.team{text-align:left; padding-left:10px}
  td.team .ti{display:flex; align-items:center; gap:8px}
  td.team .abbr{width:auto;font-size:14px}
  td.team .tn{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:66px}
  .ptscol{font-family:'Oswald';font-weight:700;font-size:15px}
  tr.qrow td:first-child::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:2px}
  tr.through td:first-child::before{background:var(--green)}
  tr.alive td:first-child::before{background:var(--gold)}
  tr.third td:first-child::before{background:var(--blue)}
  tr.out td:first-child::before{background:var(--red)}
  tr.out td.team .abbr,tr.out td.team .tn{opacity:.55}
  .gfix{padding:2px 15px 14px; display:none}
  .gcard.open .gfix{display:block}
  .gfix h4{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.8px;font-size:10.5px;color:var(--muted);margin:15px 0 8px;display:flex;align-items:center;gap:8px}
  .gfix h4::after{content:"";flex:1;height:1px;background:var(--line)}
  .mini{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;font-size:13px;cursor:pointer;background:var(--panel2)}
  .mini:active{transform:scale(.99)}
  .mini .mi-t{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
  .mini .mi-s{font-family:'Oswald';font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}
  .mini .mi-k{font-family:'Oswald';font-weight:500;font-size:11px;color:var(--muted)}
  .mini .vs{color:var(--faint);font-size:11px}
  .mini .ab2{font-family:'Oswald';font-weight:600;font-size:13px}

  nav{position:fixed; bottom:0; left:0; right:0; z-index:40; display:flex; justify-content:center; pointer-events:none}
  .navbar{pointer-events:auto; display:flex; gap:4px; margin:0 auto 14px; padding:6px;
    background:rgba(21,23,29,.93); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border:1px solid var(--line); border-radius:99px; box-shadow:var(--shadow)}
  .navbtn{display:flex; align-items:center; gap:8px; padding:11px 22px; border-radius:99px; cursor:pointer;
    font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.7px; font-size:13px; color:var(--muted); transition:.2s; border:none; background:none}
  .navbtn[aria-current="true"]{color:#1A1206; background:var(--gold)}
  .navbtn svg{width:17px;height:17px}

  .scrim{position:fixed; inset:0; z-index:50; background:rgba(4,5,8,.64); backdrop-filter:blur(3px); opacity:0; visibility:hidden; transition:.28s}
  .scrim.show{opacity:1; visibility:visible}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:51; max-width:520px; margin:0 auto; background:var(--panel);
    border-radius:22px 22px 0 0; border:1px solid var(--line); border-bottom:none; transform:translateY(102%);
    transition:transform .42s var(--ease); max-height:93vh; display:flex; flex-direction:column; box-shadow:var(--shadow)}
  .sheet.show{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:9px auto 2px;flex:0 0 auto}
  .sheet-scroll{overflow-y:auto; padding:4px 18px calc(26px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling:touch}
  .backlink{display:inline-flex; align-items:center; gap:5px; background:none; border:none; cursor:pointer; color:var(--muted);
    font-family:'Oswald'; font-weight:500; text-transform:uppercase; letter-spacing:.6px; font-size:11px; padding:9px 0 4px}

  .dt-head{text-align:center; padding:8px 0 14px}
  .dt-meta{font-family:'Oswald';text-transform:uppercase;letter-spacing:1px;font-size:11px;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;justify-content:center;gap:8px}
  .dt-teams{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:6px}
  .dt-side{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:6px 2px;border-radius:12px;transition:background .15s}
  .dt-side:active{background:rgba(255,255,255,.04)}
  .dt-flag{font-size:42px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  .dt-ab{font-family:'Oswald';font-weight:700;font-size:18px;letter-spacing:.5px}
  .dt-nm{font-size:11px;color:var(--muted);text-align:center;min-height:14px}
  .dt-mid{font-family:'Oswald';font-weight:700;text-align:center}
  .dt-mid .sc{font-size:38px;line-height:1;font-variant-numeric:tabular-nums}
  .dt-mid .ko{font-size:21px}
  .dt-mid .kos{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:.4px;text-transform:uppercase;margin-top:4px}
  .dt-mid .vs{font-size:13px;color:var(--muted);letter-spacing:1px}
  .tapnote{font-size:10px;color:var(--faint);text-align:center;margin-top:9px;font-family:'Oswald';letter-spacing:.5px;text-transform:uppercase}

  .sec-t{font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:1px;font-size:11.5px;color:var(--muted);margin:16px 0 11px;display:flex;align-items:center;gap:10px}
  .sec-t::after{content:"";flex:1;height:1px;background:var(--line)}

  .pbar{display:flex; height:13px; border-radius:7px; overflow:hidden; background:var(--panel2); border:1px solid var(--line)}
  .pseg{height:100%; width:0; transition:width .7s var(--ease)}
  .pseg.h{background:var(--blue)} .pseg.d{background:var(--faint)} .pseg.a{background:var(--red)}
  .plabels{display:flex; justify-content:space-between; margin-top:8px; font-size:11px; color:var(--muted)}
  .plabels b{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--text);display:block}
  .plabels .pl{text-align:center;flex:1}.plabels .pl:first-child{text-align:left}.plabels .pl:last-child{text-align:right}

  .seg{display:flex; gap:6px; margin:4px 0 14px; background:var(--panel2); padding:5px; border-radius:12px; border:1px solid var(--line)}
  .segb{flex:1; padding:10px 6px; border:none; background:none; border-radius:8px; cursor:pointer; color:var(--muted);
    font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:.5px; font-size:12px; transition:.18s; display:flex; flex-direction:column; align-items:center; gap:2px}
  .segb .pc{font-size:10px;font-weight:400;opacity:.8}
  .segb[aria-pressed="true"]{background:var(--text); color:var(--ink)}
  .imp{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:15px}
  .imp-head{font-size:13px; margin-bottom:14px; line-height:1.55}
  .imp-head b{color:var(--gold)} .imp-head b.r{color:#ff5e74} .imp-head b.bl{color:var(--blue)}
  .iline{display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid rgba(255,255,255,.05)}
  .iline:first-of-type{border-top:none}
  .iline .il-t{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
  .iline .ipts{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .badge{font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:9.5px;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .b-through{background:rgba(39,192,107,.15);color:var(--green);border:1px solid rgba(39,192,107,.34)}
  .b-alive{background:rgba(241,196,75,.13);color:var(--gold);border:1px solid rgba(241,196,75,.32)}
  .b-third{background:rgba(59,134,240,.14);color:var(--blue);border:1px solid rgba(59,134,240,.34)}
  .b-out{background:rgba(228,0,43,.13);color:#ff5e74;border:1px solid rgba(228,0,43,.3)}
  .note{font-size:11.5px; color:var(--muted); margin-top:13px; line-height:1.55; display:flex; gap:7px}
  .note svg{flex:0 0 auto;margin-top:1px;opacity:.7}

  .pitch{background:linear-gradient(180deg,#15824b,#0c5c34); border:1px solid rgba(255,255,255,.08); border-radius:14px;
    padding:16px 8px; display:flex; flex-direction:column; gap:13px; position:relative; overflow:hidden}
  .pitch::before{content:"";position:absolute;left:8%;right:8%;top:50%;height:1px;background:rgba(255,255,255,.16)}
  .pitch::after{content:"";position:absolute;left:50%;top:calc(50% - 20px);width:40px;height:40px;border:1px solid rgba(255,255,255,.16);border-radius:50%;transform:translateX(-50%)}
  .pline{display:flex;justify-content:space-around;align-items:flex-start;gap:4px;position:relative;z-index:1}
  .pp{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:0}
  .pdot{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.95);box-shadow:0 2px 5px rgba(0,0,0,.4)}
  .pnm{font-size:9px;color:#fff;text-align:center;line-height:1.05;text-shadow:0 1px 2px rgba(0,0,0,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .subs{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:11px}
  .subs-l{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.6px;font-size:10px;color:var(--muted);width:100%;margin-bottom:2px}
  .subchip{font-size:11.5px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:3px 9px}

  .stat{margin-bottom:13px}
  .stat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .stat-top .sv{font-family:'Oswald';font-weight:600;font-size:13.5px;font-variant-numeric:tabular-nums}
  .stat-top .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .sbar{display:flex;height:6px;border-radius:4px;overflow:hidden;background:var(--line);gap:2px}
  .sbar .sh{background:var(--blue)} .sbar .sa{background:var(--red)}

  .ev{display:flex;align-items:center;gap:11px;padding:9px 0;border-top:1px solid rgba(255,255,255,.05)}
  .ev:first-child{border-top:none}
  .ev .emin{font-family:'Oswald';font-weight:600;font-size:12.5px;color:var(--muted);width:30px;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .ev .eic{width:18px;text-align:center;font-size:13px;flex:0 0 auto}
  .ev .etx{font-size:13px;display:flex;align-items:center;gap:8px;flex:1}
  .ev .escore{font-family:'Oswald';font-weight:700;font-variant-numeric:tabular-nums;margin-left:auto;color:var(--text)}

/* ---- build team table from results (recomputed on every data refresh) ---- */
const TEAM={};
function rebuildTeams(){
  Object.keys(META).forEach(ab=>{const m=META[ab];TEAM[ab]={ab,name:m[0],group:m[1],seed:m[2],rank:m[2],flag:FLAG[ab]||'🏳️',pts:0,w:0,d:0,l:0,gf:0,ga:0,gp:0};});
  GAMES.forEach(g=>{if(!g.fin)return;const H=TEAM[g.home],A=TEAM[g.away];H.gp++;A.gp++;H.gf+=g.hs;H.ga+=g.as;A.gf+=g.as;A.ga+=g.hs;
    if(g.hs>g.as){H.w++;A.l++;H.pts+=3;}else if(g.hs<g.as){A.w++;H.l++;A.pts+=3;}else{H.d++;A.d++;H.pts++;A.pts++;}});
  Object.values(TEAM).forEach(t=>{t.gd=t.gf-t.ga;});
  /* live re-rank within each group: points, then goal difference, then goals for, then seed */
  [...new Set(Object.values(TEAM).map(t=>t.group))].forEach(g=>{
    Object.values(TEAM).filter(t=>t.group===g)
      .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.seed-b.seed)
      .forEach((t,i)=>t.rank=i+1);
  });
}
rebuildTeams();
const ORD=n=>n===1?'1st':n===2?'2nd':n===3?'3rd':n+'th';
const status=g=>g.fin?'final':'sched';

/* ---- 4-tier qualification engine ---- */
function teamsOf(g){return Object.values(TEAM).filter(t=>t.group===g).map(t=>t.ab);}
function remainingFixtures(g){return GAMES.filter(m=>m.group===g&&!m.fin);}
function expectedRemaining(g){return teamsOf(g).reduce((n,ab)=>n+(3-TEAM[ab].gp),0)/2;}
function isFull(g){const r=remainingFixtures(g);return r.length>0&&r.length===expectedRemaining(g);}
function applyRes(pts,m,o){if(o==='H')pts[m.home]+=3;else if(o==='A')pts[m.away]+=3;else{pts[m.home]++;pts[m.away]++;}}
function aboveBounds(g,ov){
  ov=ov||{}; const teams=teamsOf(g), base={}; teams.forEach(ab=>base[ab]=TEAM[ab].pts);
  const rem=remainingFixtures(g), out={}; teams.forEach(ab=>out[ab]={min:Infinity,max:-Infinity});
  if(isFull(g)){
    const free=rem.filter(m=>!(m.id in ov)), fixed=rem.filter(m=>m.id in ov), O=['H','D','A'];
    for(let c=0;c<Math.pow(3,free.length);c++){
      const pts={...base}; fixed.forEach(m=>applyRes(pts,m,ov[m.id]));
      let cc=c; for(const m of free){applyRes(pts,m,O[cc%3]);cc=Math.floor(cc/3);}
      teams.forEach(ab=>{let gt=0;teams.forEach(o=>{if(o!==ab&&pts[o]>pts[ab])gt++;}); if(gt<out[ab].min)out[ab].min=gt; if(gt>out[ab].max)out[ab].max=gt;});
    }
  } else {
    const pts={...base}, gp={}; teams.forEach(ab=>gp[ab]=TEAM[ab].gp);
    Object.keys(ov).forEach(id=>{const m=GById[id]; if(m&&m.group===g){applyRes(pts,m,ov[id]);gp[m.home]++;gp[m.away]++;}});
    const maxp={}; teams.forEach(ab=>maxp[ab]=pts[ab]+3*(3-gp[ab]));
    teams.forEach(ab=>{let must=0,can=0;teams.forEach(o=>{if(o!==ab){if(pts[o]>maxp[ab])must++;if(maxp[o]>pts[ab])can++;}});out[ab]={min:must,max:can};});
  }
  return out;
}
function classifyGroup(g,ov){
  // Fully-decided group (no remaining fixtures, no hypothetical override): classify by
  // actual finishing rank (points -> goal difference -> goals for) so teams level on
  // points don't both count as "through". Exactly two teams can finish in the top two.
  if(!(ov&&Object.keys(ov).length)&&remainingFixtures(g).length===0){
    const res={};
    teamsOf(g).forEach(ab=>{const r=TEAM[ab].rank;res[ab]=r<=2?'through':r===3?'third':'out';});
    return res;
  }
  const ab=aboveBounds(g,ov), res={};
  Object.keys(ab).forEach(t=>{const best=ab[t].min+1,worst=ab[t].max+1;
    res[t]=worst<=2?'through':best<=2?'alive':best===3?'third':'out';});
  return res;
}
function projPoints(g,m,o){const pts={};teamsOf(g).forEach(ab=>pts[ab]=TEAM[ab].pts);if(o)applyRes(pts,m,o);return pts;}
/* fold any in-progress match in this group into the projection at its current score,
   so a live game is treated as a provisional result rather than an unplayed coin-flip */
function liveOverrides(g){const ov={};GAMES.forEach(m=>{if(m.group===g&&m.live)ov[m.id]=m.hs>m.as?'H':m.hs<m.as?'A':'D';});return ov;}

function matchCard(g){
  const t=TEAM,live=g.live,fin=g.fin,showScore=fin||live;
  const meta=live?'<span class="lvm"><span class="livedot"></span><span data-clk="'+g.id+'">'+liveMinuteStr(g)+'</span></span>'
    :fin?'<span>Full time</span>':'<span>'+fmtTime(g.ko)+'</span>';
  const sc=(a,b)=>'<div class="score '+(live?'live ':'')+(a>b?'winner':a<b?'loser':'')+'">'+a+'</div>';
  const tr=(ab,right)=>'<div class="row"><div class="tm"><span class="flag">'+t[ab].flag+'</span><span class="abbr">'+ab+'</span><span class="tname">'+t[ab].name+'</span></div>'+(right||'')+'</div>';
  const rows=showScore?tr(g.home,sc(g.hs,g.as))+tr(g.away,sc(g.as,g.hs)):tr(g.home)+tr(g.away);
  return '<div class="match'+(live?' islive':'')+'" data-m="'+g.id+'" tabindex="0" role="button" aria-label="Match details">'
    +'<div class="m-body"><div class="mtop"><div class="mmeta">'+meta+'</div><span class="grouptag">Grp '+g.group+' · MD'+g.md+'</span></div>'+rows+'</div>'

  }
  rw.style.display='block';

}

let stack=[];

function showSheet(){document.getElementById('sheet').classList.add('show');document.getElementById('scrim').classList.add('show');document.body.style.overflow='hidden';}

const verbFor=s=>s==='through'?'<b>qualify</b>':s==='out'?'are <b class="r">eliminated</b>':s==='third'?'drop into the <b class="bl">3rd-place race</b>':'keep the <b>top-two fight</b> alive';

function currentGroupBlock(g){

function parsePlayer(s){const m=s.match(/^(.*)\s\((goalkeeper|defender|midfielder|forward)\)$/);let name=m?m[1]:s,pos=m?m[2]:'midfielder';return{name:name.includes(',')?name.split(',')[0].trim():name.trim(),pos};}

function matchSheet(id){

function teamScenario(ab){
  const t=TEAM[ab],g=t.group,ov=liveOverrides(g),now=classifyGroup(g,ov)[ab];
  const bd=aboveBounds(g,ov)[ab];
  const next=GAMES.filter(m=>m.group===g&&!m.fin&&!m.live&&(m.home===ab||m.away===ab)).sort((a,b)=>a.ko-b.ko)[0];
  if(now==='through')return{tone:'through',head:bd.max+1===1?'Top spot secured':'Through to the last 32',sub:bd.max+1===1?'Guaranteed to win the group and bank a top seeding for the knockouts.':'A top-two finish is locked in — already into the Round of 32.'};
  if(now==='out')return{tone:'out',head:'Eliminated',sub:'Out of reach for both a top-two place and a best-third spot. Their tournament ends in the group stage.'};
  if(now==='third'){let sub='Can no longer catch the top two, but a third-place finish keeps them in the race for the eight best-third-placed berths.';
    if(next){const opp=TEAM[next.home===ab?next.away:next.home].name,win=next.home===ab?'H':'A';sub+=classifyGroup(g,{...ov,[next.id]:win})[ab]==='third'?' A win over '+opp+' strengthens that third-place push.':' They likely need a result against '+opp+' to stay in it.';}
    return{tone:'third',head:'In the third-place race',sub};}
  if(!next)return{tone:'alive',head:'Still alive',sub:'A top-two place is still mathematically possible, but it now hinges on other results in the group.'};
  const opp=TEAM[next.home===ab?next.away:next.home].name,win=next.home===ab?'H':'A',loss=next.home===ab?'A':'H';
  const sW=classifyGroup(g,{...ov,[next.id]:win})[ab],sD=classifyGroup(g,{...ov,[next.id]:'D'})[ab],sL=classifyGroup(g,{...ov,[next.id]:loss})[ab];
  let head,sub;
  if(sD==='through'&&sW==='through'){head='Draw or better to qualify';sub='Avoid defeat against '+opp+' and a top-two place is guaranteed.';}
  else if(sW==='through'){head='Win to qualify';sub='Beat '+opp+" and they're through. A draw leaves it to other results.";}
  else if(sW==='alive'){head='Win and hope';sub='A win over '+opp+' keeps a top-two place in play, but they may still need a favour elsewhere.';}
  else{head='Outside chance';sub='Realistically need to beat '+opp+' and lean on other results to climb into the top two.';}
  if(sL==='out')sub+=' Defeat ends their run entirely.';else if(sL==='third')sub+=' Defeat would drop them into the third-place race.';
  return{tone:'alive',head,sub};
}

let lastUpdated=null, feedOk=null;

/* current live minute, advanced locally between polls and re-synced to ESPN each poll */
function liveMinuteStr(g){
  const ci=g.clockInfo; if(!ci)return 'Live';
  if(ci.isHT)return 'HT';
  const elapsed=Math.max(0,Math.floor((Date.now()-ci.syncedAt)/60000));
  let mins=(ci.serverMin||0)+elapsed; if(mins<1)mins=1;
  const cap=(ci.period&&ci.period>=2)?90:45;
  return mins>cap?cap+"+'":mins+"'";
}

function updateHeaderStatus(){
  const st=document.getElementById('hdrStatus'); if(!st)return;
  const upd=lastUpdated?'<span class="upd">'+(feedOk===false?'Saved data':'Updated '+fmtTime(lastUpdated))+'</span>':'';
  const live=GAMES.filter(g=>g.live).sort((a,b)=>a.ko-b.ko);
  if(live.length){
    st.classList.add('islive');
    const g=live[0];
    st.innerHTML='<span class="livedot"></span>Live'+(live.length>1?' ('+live.length+')':'')+'<br><b>'+g.home+' '+g.hs+'–'+g.as+' '+g.away+'</b> <span class="hdrclk" data-clk="'+g.id+'">'+liveMinuteStr(g)+'</span>'+upd;
  } else {
    st.classList.remove('islive');
    const up=GAMES.filter(g=>!g.fin).sort((a,b)=>a.ko-b.ko)[0];
    st.innerHTML=(up?'Next match<br><b>'+dayShort(up.ko)+' · '+fmtTime(up.ko)+'</b>':'<b>Group stage complete</b>')+upd;
  }
}

/* re-render current view, preserving scroll; refresh an open *live* match sheet only */
function rerender(){
  const y=window.scrollY;
  curView==='matches'?renderMatches():renderStandings();
  window.scrollTo(0,y);
  const top=stack[stack.length-1];
  if(top&&top.type==='match'&&GById[top.key]&&GById[top.key].live)renderSheet();
}

const FEED='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=300';
const SUMMARY=id=>'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event='+id;
/* try direct first (ESPN is normally CORS-open), then fall back through public CORS proxies */
const PROXIES=[u=>u, u=>'https://corsproxy.io/?url='+encodeURIComponent(u), u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];
async function fetchJSON(url){
  let err;
  for(const wrap of PROXIES){
    try{const r=await fetch(wrap(url),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
    catch(e){err=e;}
  }
  throw err;
}

/* match ESPN events to app games by unordered abbreviation pair (ordering-proof) */
const PAIR=(a,b)=>[a,b].sort().join('|');
const PAIR_INDEX={}; GAMES.forEach(g=>PAIR_INDEX[PAIR(g.home,g.away)]=g);
const ESPN_ALIAS={CUR:'CUW',DRC:'COD'}; /* defensive aliases; harmless if unused */
const ab2app=ab=>ESPN_ALIAS[ab]||ab;
const espnMinute=dv=>{const m=String(dv||'').match(/(\d+)(?:'?\+(\d+))?/);return m?parseInt(m[1],10)+(m[2]?parseInt(m[2],10):0):0;};
const posGroup=p=>{const s=(p||'').toLowerCase();if(s.includes('goal'))return'goalkeeper';if(s.includes('def')||s.includes('back'))return'defender';if(s.includes('forward')||s.includes('strik')||s.includes('wing'))return'forward';if(s.includes('mid'))return'midfielder';return'midfielder';};

function buildDetail(comp,g){
  const cs=comp.competitors||[]; const idToAb={};
  cs.forEach(c=>{idToAb[(c.team||{}).id]=ab2app((c.team||{}).abbreviation);});
  const side=ab=>ab===g.home?'h':'a';
  const statOf=(c,n)=>{const s=(c.statistics||[]).find(x=>x.name===n);return s?Math.round(parseFloat(s.displayValue)||0):0;};
  const ch=cs.find(c=>side(ab2app((c.team||{}).abbreviation))==='h'),ca=cs.find(c=>side(ab2app((c.team||{}).abbreviation))==='a');
  let st=null;
  if(ch&&ca&&(ch.statistics||[]).length){
    st={pos:[statOf(ch,'possessionPct'),statOf(ca,'possessionPct')],sh:[statOf(ch,'totalShots'),statOf(ca,'totalShots')],
      sot:[statOf(ch,'shotsOnTarget'),statOf(ca,'shotsOnTarget')],cor:[statOf(ch,'wonCorners'),statOf(ca,'wonCorners')],
      fl:[statOf(ch,'foulsCommitted'),statOf(ca,'foulsCommitted')],yc:[0,0],rc:[0,0]};
  }
  const ev=[]; let hsc=0,asc=0;
  [...(comp.details||[])].sort((a,b)=>((a.clock&&a.clock.value)||0)-((b.clock&&b.clock.value)||0)).forEach(d=>{
    const ab=idToAb[(d.team||{}).id]; if(!ab)return; const s=side(ab),min=espnMinute(d.clock&&d.clock.displayValue);
    if(d.scoringPlay){const b=d.ownGoal?(s==='h'?'a':'h'):s; if(b==='h')hsc++;else asc++; ev.push([min,'G',b,hsc,asc]);}
    else if(d.redCard){ev.push([min,'R',s]); if(st)st.rc[s==='h'?0:1]++;}
    else if(d.yellowCard){ev.push([min,'Y',s]); if(st)st.yc[s==='h'?0:1]++;}
  });
  return {st,ev};
}

function applyScoreboard(data){
  ((data&&data.events)||[]).forEach(ev=>{
    const comp=ev.competitions&&ev.competitions[0]; if(!comp)return;
    const cs=comp.competitors||[]; if(cs.length<2)return;
    const a=ab2app((cs[0].team||{}).abbreviation),b=ab2app((cs[1].team||{}).abbreviation);
    const g=PAIR_INDEX[PAIR(a,b)]; if(!g)return;
    const stt=(comp.status&&comp.status.type)||{},state=stt.state;
    const sc={}; cs.forEach(c=>sc[ab2app((c.team||{}).abbreviation)]=parseInt(c.score,10)||0);
    if(state==='post'||state==='in'){if(g.home in sc)g.hs=sc[g.home]; if(g.away in sc)g.as=sc[g.away];}
    g.fin=state==='post'||stt.completed===true;
    g.live=state==='in';
    if(g.live){
      const sObj=comp.status||{},raw=(sObj.displayClock&&sObj.displayClock!=="0'")?sObj.displayClock:(stt.shortDetail||stt.detail||'');
      const dtxt=((stt.description||'')+' '+(stt.shortDetail||'')+' '+(stt.detail||'')).toLowerCase();
      const isHT=dtxt.includes('halftime')||dtxt.includes('half time')||/(^|\s)ht(\s|$)/.test(dtxt);
      let serverMin=espnMinute(raw);
      if(serverMin===0&&!/\d/.test(String(raw))){const ko=ev.date?new Date(ev.date):g.ko;serverMin=Math.max(1,Math.floor((Date.now()-ko)/60000)-((sObj.period||1)>=2?15:0));}
      g.clockInfo={period:sObj.period||1,isHT,serverMin,syncedAt:Date.now()};
    } else g.clockInfo=null;
    g.espnId=ev.id;
    if(ev.date)g.ko=new Date(ev.date);
    if(g.fin||g.live){const d=buildDetail(comp,g),prev=GS[g.id]||{};
      if(d.ev.length||d.st)GS[g.id]={st:d.st||prev.st||null,ev:d.ev.length?d.ev:(prev.ev||[]),xi:prev.xi};}
  });
  rebuildTeams();
}

const gamesSig=()=>GAMES.map(g=>g.id+(g.live?'L':g.fin?'F':'P')+g.hs+'-'+g.as).join(',');

async function refresh(){
  const before=gamesSig();
  try{
    const data=await fetchJSON(FEED);
    applyScoreboard(data);
    feedOk=true; lastUpdated=new Date();
    if(gamesSig()!==before)rerender();
    updateHeaderStatus();
  }catch(e){
    console.warn('[WC] live refresh failed — keeping saved data:',e);
    feedOk=false; updateHeaderStatus();
  }
}

/* lineups aren't in the scoreboard feed — fetch them on demand when a match opens */
const lineupTried=new Set();
function parseRosters(sum,g){
  const rs=sum&&sum.rosters; if(!rs)return null; const out={};
  rs.forEach(r=>{const ab=ab2app((r.team||{}).abbreviation),key=ab===g.home?g.home:ab===g.away?g.away:null; if(!key)return;
    const pl=r.roster||[],fmt=p=>{const nm=(p.athlete&&(p.athlete.displayName||p.athlete.fullName))||'Player',pos=posGroup((p.position&&(p.position.name||p.position.displayName||p.position.abbreviation))||'');return nm+' ('+pos+')';};
    out[key]=[...pl.filter(p=>p.starter).map(fmt),...pl.filter(p=>!p.starter).map(fmt)];});
  return (out[g.home]&&out[g.away]&&out[g.home].length>=11)?out:null;
}
async function maybeFetchLineups(id){
  const g=GById[id]; if(!g||!g.espnId||lineupTried.has(id))return;
  if(GS[id]&&GS[id].xi)return; if(!(g.fin||g.live))return;
  lineupTried.add(id);
  try{const sum=await fetchJSON(SUMMARY(g.espnId)),xi=parseRosters(sum,g);
    if(xi){GS[id]={st:(GS[id]&&GS[id].st)||null,ev:(GS[id]&&GS[id].ev)||[],xi};
      const top=stack[stack.length-1]; if(top&&top.type==='match'&&top.key===id)renderSheet();}
  }catch(e){console.warn('[WC] lineup fetch failed',id,e);}
}

/* boot */
rebuildTeams();
updateHeaderStatus();
setView('matches');
refresh();
setInterval(refresh,45000);
/* advance the live minute locally every second between feed polls */
setInterval(()=>{
  if(!GAMES.some(g=>g.live))return;
  document.querySelectorAll('[data-clk]').forEach(el=>{const g=GById[el.getAttribute('data-clk')]; if(g&&g.live)el.textContent=liveMinuteStr(g);});
},1000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh();});

</script>
